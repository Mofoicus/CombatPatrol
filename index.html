<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14170f">
<title>Combat Patrol Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    --bg:#14170f;
    --surface:#1c2116;
    --surface2:#262d1c;
    --surface3:#30381f;
    --line:#3a4227;
    --green:#7c9a2e;
    --green-bright:#a4c94a;
    --red:#b3311f;
    --red-bright:#d64a30;
    --yellow:#d9a520;
    --bone:#ece7d4;
    --muted:#9aa085;
    --muted-dim:#6c7259;
    --radius:10px;
    --stripe: repeating-linear-gradient(135deg, var(--yellow) 0 10px, #14170f 10px 20px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, #202714 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 0%, #1a2510 0%, transparent 55%),
      var(--bg);
    color:var(--bone);
    font-family:'Barlow', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--green); color:#0e1109; }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--surface3); border-radius:4px; }

  .app{ max-width:720px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; padding-bottom:78px; }

  /* HEADER */
  header.top{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, #191e12 0%, #14170f 100%);
    border-bottom:3px solid transparent;
    border-image: var(--stripe) 3;
    padding:14px 16px 12px;
  }
  .brand{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  .force-switcher{ display:flex; align-items:baseline; gap:8px; background:none; border:none; padding:0; cursor:pointer; text-align:left; }
  .force-switcher .switcher-text{ display:flex; flex-direction:column; gap:2px; }
  .force-switcher .switch-chevron{ color:var(--green-bright); font-size:12px; align-self:center; }
  .brand h1{
    font-family:'Bebas Neue', sans-serif;
    font-size:30px; letter-spacing:1px; margin:0; color:var(--green-bright);
    text-shadow: 2px 2px 0 #0b0d07;
  }
  .brand .sub{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; }
  .search-wrap{ margin-top:10px; position:relative; }
  .search-wrap input{
    width:100%; background:var(--surface); border:1px solid var(--line); color:var(--bone);
    padding:10px 12px 10px 34px; border-radius:8px; font-family:'Barlow'; font-size:15px; font-weight:500;
  }
  .search-wrap input:focus{ outline:none; border-color:var(--green); }
  .search-wrap svg{ position:absolute; left:10px; top:50%; transform:translateY(-50%); opacity:.6; }

  /* TABS */
  nav.tabs{
    display:flex; gap:6px; padding:10px 16px 0; overflow-x:auto; scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{ display:none; }
  nav.tabs button{
    flex:0 0 auto; background:var(--surface); border:1px solid var(--line); color:var(--muted);
    font-family:'Bebas Neue'; font-size:16px; letter-spacing:.5px; padding:8px 14px 6px;
    border-radius:7px 7px 0 0; cursor:pointer;
  }
  nav.tabs button.active{ background:var(--surface2); color:var(--green-bright); border-color:var(--green); border-bottom-color:var(--surface2); position:relative; top:1px; }

  main{ padding:14px 16px 24px; flex:1; }
  section.panel{ display:none; }
  section.panel.active{ display:block; animation:fade .15s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(3px);} to{opacity:1; transform:none;} }

  .section-head{ display:flex; align-items:center; gap:10px; margin:18px 0 10px; }
  .section-head:first-child{ margin-top:2px; }
  .section-head h2{ font-family:'Bebas Neue'; font-size:20px; letter-spacing:.5px; color:var(--yellow); margin:0; white-space:nowrap; }
  .section-head .rule{ flex:1; height:5px; background:var(--stripe); opacity:.55; border-radius:2px; }

  /* UNIT CARDS */
  .unit-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:12px; overflow:hidden;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  }
  .unit-head{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:12px 14px; cursor:pointer; background:linear-gradient(90deg, var(--surface2), var(--surface));
  }
  .unit-head:active{ background:var(--surface3); }
  .unit-title{ display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
  .unit-title .name{ font-family:'Bebas Neue'; font-size:21px; letter-spacing:.5px; color:var(--bone); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .unit-title .kw{ font-size:11px; color:var(--muted-dim); letter-spacing:.5px; }
  .chevron{ font-size:14px; color:var(--green-bright); transition:transform .15s; flex:0 0 auto; }
  .unit-card.open .chevron{ transform:rotate(90deg); }
  .unit-body{ display:none; padding:12px 14px 16px; border-top:1px solid var(--line); }
  .unit-card.open .unit-body{ display:block; }

  .statline{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; margin-bottom:10px; }
  .statline.short{ grid-template-columns:repeat(6,1fr); }
  .stat{ background:var(--surface3); border:1px solid var(--line); border-radius:6px; text-align:center; padding:6px 2px; }
  .stat .k{ font-size:9px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
  .stat .v{ font-family:'JetBrains Mono'; font-weight:700; font-size:16px; color:var(--green-bright); }
  .invuln-pill{
    display:inline-flex; align-items:center; gap:6px; background:var(--surface3); border:1px solid var(--yellow);
    color:var(--yellow); font-family:'JetBrains Mono'; font-size:12px; font-weight:700; padding:4px 9px; border-radius:20px; margin-bottom:10px;
  }
  .model-variant{ font-size:12px; color:var(--muted); margin:2px 0 10px; line-height:1.5; }
  .model-variant b{ color:var(--bone); }

  table.weapons{ width:100%; border-collapse:collapse; margin-bottom:10px; font-size:12.5px; }
  table.weapons caption{ text-align:left; font-family:'Bebas Neue'; letter-spacing:.5px; font-size:13px; color:var(--green-bright); padding-bottom:5px; }
  table.weapons th{ text-align:center; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:5px 4px; border-bottom:1px solid var(--line); }
  table.weapons th:first-child{ text-align:left; }
  table.weapons td{ text-align:center; padding:6px 4px; border-bottom:1px solid #23291a; font-family:'JetBrains Mono'; font-weight:500; color:var(--bone); }
  table.weapons td:first-child{ text-align:left; font-family:'Barlow'; font-weight:600; color:var(--bone); }
  table.weapons tr:last-child td{ border-bottom:none; }
  .tags{ display:block; font-family:'Barlow'; font-size:10px; color:var(--yellow); font-weight:600; margin-top:1px; }

  .ability{ margin-bottom:8px; font-size:13.5px; line-height:1.5; }
  .ability .label{ font-weight:700; color:var(--green-bright); }
  .ability .core{ font-weight:700; color:var(--yellow); }
  .keywords{ margin-top:10px; font-size:11px; color:var(--muted-dim); line-height:1.6; }

  /* OWNED TOGGLE */
  .owned-toggle{
    display:inline-flex; align-items:center; gap:5px; background:var(--surface3); border:1px solid var(--line);
    color:var(--muted); font-family:'Barlow'; font-weight:700; font-size:10.5px; letter-spacing:.4px; text-transform:uppercase;
    padding:5px 9px; border-radius:20px; cursor:pointer; flex:0 0 auto; white-space:nowrap;
  }
  .owned-toggle.owned{ background:var(--green); border-color:var(--green); color:#0e1109; }
  .owned-toggle .dot{ width:7px; height:7px; border-radius:50%; background:var(--muted-dim); flex:0 0 auto; }
  .owned-toggle.owned .dot{ background:#0e1109; }

  /* PHOTO GALLERY */
  .photo-section{ margin:6px 0 12px; }
  .photo-section .ps-label{ font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; font-weight:700; }
  .photo-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; }
  .photo-thumb{ position:relative; flex:0 0 auto; width:72px; height:72px; border-radius:8px; overflow:hidden; border:1px solid var(--line); }
  .photo-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo-thumb .del{
    position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%; background:rgba(10,12,7,0.75);
    color:var(--bone); border:none; font-size:11px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .photo-add{
    flex:0 0 auto; width:72px; height:72px; border-radius:8px; border:1.5px dashed var(--line); background:var(--surface3);
    color:var(--muted); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:10px; cursor:pointer; gap:2px;
  }
  .photo-add span.plus{ font-size:20px; line-height:1; color:var(--green-bright); }
  .keywords b{ color:var(--muted); }

  /* GENERIC CARD (stratagems / enhancements / secondaries / glossary) */
  .info-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:12px 14px; margin-bottom:10px;
  }
  .info-card .row1{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:5px; }
  .info-card h3{ font-family:'Bebas Neue'; font-size:18px; letter-spacing:.4px; color:var(--bone); margin:0; }
  .cost{ font-family:'JetBrains Mono'; font-weight:700; font-size:12px; color:#0e1109; background:var(--yellow); padding:2px 8px; border-radius:20px; white-space:nowrap; }
  .kind{ font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .flufftext{ font-size:12px; color:var(--muted); font-style:italic; margin-bottom:8px; line-height:1.5; }

  /* Stratagem cards: colored by phase, matching GW's own convention —
     red = opponent's turn, blue = your turn, green = Command phase */
  .strat-card{ padding:0; overflow:hidden; }
  .strat-header{
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    padding:10px 14px; margin:0;
  }
  .strat-header h3{ font-family:'Bebas Neue'; font-size:17px; letter-spacing:.4px; color:#fff; margin:0; }
  .strat-card .rule-line{ padding:0 14px; margin:0 0 4px; }
  .strat-card .rule-line:first-of-type{ margin-top:10px; }
  .strat-card .rule-line:last-child{ margin-bottom:12px; }
  .strat-red .strat-header{ background:linear-gradient(135deg, #8a2a1f, #6e2018); }
  .strat-blue .strat-header{ background:linear-gradient(135deg, #2a5a7a, #1f4560); }
  .strat-green .strat-header{ background:linear-gradient(135deg, #2f6b4f, #235339); }
  .rule-line{ font-size:13.5px; line-height:1.55; margin-bottom:4px; }
  .rule-line b{ color:var(--green-bright); }

  .info-card.selectable{ cursor:pointer; transition:border-color .12s, background .12s; user-select:none; }
  .info-card.selectable:active{ background:var(--surface3); }
  .info-card.selectable .select-indicator{ margin-top:8px; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
  .info-card.selectable .select-check{ display:none; color:var(--green-bright); }
  .info-card.selectable .select-prompt{ color:var(--muted-dim); }
  .info-card.selectable.selected{ border-color:var(--green); background:linear-gradient(160deg, var(--surface2), var(--surface)); box-shadow:0 0 0 1px var(--green) inset; }
  .info-card.selectable.selected .select-check{ display:inline; }
  .info-card.selectable.selected .select-prompt{ display:none; }
  .default-badge{ font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:var(--green-bright); border:1px solid var(--green); padding:2px 6px; border-radius:4px; }

  .glossary-term{ font-family:'JetBrains Mono'; font-weight:700; color:var(--yellow); font-size:13.5px; }

  .faction-rule-card{
    background:linear-gradient(160deg, var(--surface2), var(--surface));
    border:1px solid var(--green); border-radius:var(--radius); padding:16px; margin-bottom:16px;
  }
  .faction-rule-card h2{ font-family:'Bebas Neue'; font-size:26px; color:var(--green-bright); margin:0 0 8px; letter-spacing:1px; }
  .faction-rule-card ul{ margin:8px 0 0; padding-left:18px; }
  .faction-rule-card li{ font-size:13.5px; line-height:1.6; margin-bottom:4px; }

  .empty{ text-align:center; color:var(--muted-dim); padding:30px 10px; font-size:13.5px; }

  /* BOTTOM NAV */
  nav.bottom{
    position:fixed; bottom:0; left:0; right:0; z-index:30;
    background:#12150d; border-top:3px solid transparent; border-image:var(--stripe) 3;
    display:flex; max-width:720px; margin:0 auto;
  }
  nav.bottom button{
    flex:1; background:none; border:none; color:var(--muted-dim); padding:9px 4px 8px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:2px; font-family:'Barlow'; font-weight:600; font-size:10.5px; letter-spacing:.3px; text-transform:uppercase;
  }
  nav.bottom button.active{ color:var(--green-bright); }
  nav.bottom svg{ width:20px; height:20px; }

  @media (min-width:600px){
    nav.tabs{ display:flex; }
    nav.bottom{ display:none; }
    .app{ padding-bottom:0; }
    .statline{ grid-template-columns:repeat(6,1fr); }
  }
  @media (max-width:599px){
    nav.tabs{ display:none; }
  }

  /* Wide viewports (landscape phones, tablets): stay single-column but stretch it out */
  @media (min-width:760px){
    .app{ max-width:900px; }
  }
  @media (min-width:1000px){
    .app{ max-width:1040px; }
  }

  /* Short viewports (phone landscape): claw back vertical space from the header/tabs */
  @media (orientation:landscape) and (max-height:500px){
    header.top{ padding:8px 16px 6px; }
    .brand h1{ font-size:22px; }
    .brand .sub{ display:none; }
    .search-wrap{ margin-top:6px; }
    .search-wrap input{ padding:7px 12px 7px 32px; font-size:14px; }
    nav.tabs{ padding:6px 16px 0; }
    nav.tabs button{ padding:6px 12px 5px; font-size:14px; }
    main{ padding:10px 16px 16px; }
  }

  .modal-overlay{
    position:fixed; inset:0; z-index:50; background:rgba(10,12,7,0.75); backdrop-filter:blur(2px);
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.open{ display:flex; }
  .modal-sheet{
    background:var(--surface); border:1px solid var(--line); border-top:3px solid transparent; border-image:var(--stripe) 3;
    border-radius:14px 14px 0 0; width:100%; max-width:720px; max-height:80vh; overflow-y:auto; padding:16px 16px 24px;
    animation:slideup .18s ease;
  }
  @keyframes slideup{ from{transform:translateY(20px); opacity:.5;} to{transform:none; opacity:1;} }
  .modal-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .modal-head h2{ font-family:'Bebas Neue'; font-size:22px; color:var(--green-bright); margin:0; letter-spacing:.5px; }
  .modal-close{ background:var(--surface3); border:1px solid var(--line); color:var(--bone); width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:16px; line-height:1; }
  .force-card{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    background:var(--surface2); border:1px solid var(--line); border-left:4px solid var(--line); border-radius:9px; padding:12px 14px; margin-bottom:8px; cursor:pointer;
  }
  .force-card:active{ background:var(--surface3); }
  .force-card.active{ border-color:var(--green); border-left-color:var(--green); }
  .force-card.type-cp{ border-left-color:#c9822f; }
  .force-card.type-sh{ border-left-color:#3d8fa8; }
  .force-card.active.type-cp{ border-left-color:#c9822f; }
  .force-card.active.type-sh{ border-left-color:#3d8fa8; }
  .force-card .fc-name{ font-family:'Bebas Neue'; font-size:18px; color:var(--bone); letter-spacing:.4px; }
  .force-card .fc-sub{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:1px; }
  .force-card .fc-badge{ font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; padding:3px 8px; border-radius:20px; background:var(--surface3); color:var(--muted); white-space:nowrap; }
  .fc-badge.badge-cp{ background:#c9822f; color:#1a1206; }
  .fc-badge.badge-sh{ background:#3d8fa8; color:#071417; }
  .fc-right{ display:flex; align-items:center; gap:8px; flex:0 0 auto; }
  .force-empty-note{ font-size:12.5px; color:var(--muted-dim); line-height:1.6; padding:10px 4px 2px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <button class="force-switcher" id="forceSwitcher">
        <span class="switcher-text">
          <h1 id="forceName">'ARDMOB</h1>
          <span class="sub" id="forceSub">Combat Patrol · Orks · 11th Edition</span>
        </span>
        <span class="switch-chevron">▾</span>
      </button>
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9aa085" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search weapons, abilities, rules…" autocomplete="off">
    </div>
  </header>

  <nav class="tabs" id="tabsTop"></nav>

  <main>
    <section class="panel" id="panel-units"></section>
    <section class="panel" id="panel-strats"></section>
    <section class="panel" id="panel-faction"></section>
    <section class="panel" id="panel-glossary"></section>
  </main>
</div>

<nav class="bottom" id="tabsBottom"></nav>

<div class="modal-overlay" id="forceModal">
  <div class="modal-sheet">
    <div class="modal-head">
      <h2>Choose a Force</h2>
      <button class="modal-close" id="forceModalClose">✕</button>
    </div>
    <div id="forceList"></div>
    <div class="force-empty-note">More Combat Patrols and Spearhead forces can be added here — send over the data (spreadsheet or file) for another faction and it'll show up in this list.</div>
  </div>
</div>

<script>

/* ============ RENDER ============ */
function svgIcon(path){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="${path}"/></svg>`; }

function renderTabs(){
  const top = document.getElementById('tabsTop');
  const bottom = document.getElementById('tabsBottom');
  const force = FORCES[currentForceId];
  const tabs = TABS.map(t=> t.id==='strats' ? {...t, label: force.system==='aos' ? 'Regiment' : 'Stratagems'} : t);
  top.innerHTML = tabs.map(t=>`<button data-tab="${t.id}" class="${t.id==='units'?'active':''}">${t.label}</button>`).join('');
  bottom.innerHTML = tabs.map(t=>`<button data-tab="${t.id}" class="${t.id==='units'?'active':''}">${svgIcon(t.icon)}<span>${t.label}</span></button>`).join('');
  [...top.children, ...bottom.children].forEach(btn=>{
    btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
  });
}

function switchTab(id){
  document.querySelectorAll('#tabsTop button, #tabsBottom button').forEach(b=> b.classList.toggle('active', b.dataset.tab===id));
  document.querySelectorAll('section.panel').forEach(p=> p.classList.toggle('active', p.id==='panel-'+id));
  window.scrollTo({top:0, behavior:'instant'});
}

function weaponRows40k(list){
  if(!list || !list.length) return '';
  return list.map(w=>`<tr><td>${w.name}${w.tag?`<span class="tags">${w.tag}</span>`:''}</td><td>${w.range}</td><td>${w.a}</td><td>${w.bs}</td><td>${w.s}</td><td>${w.ap}</td><td>${w.d}</td></tr>`).join('');
}

function weaponRowsAos(list, ranged){
  if(!list || !list.length) return '';
  return list.map(w=>`<tr><td>${w.name}${w.tag?`<span class="tags">${w.tag}</span>`:''}</td>${ranged?`<td>${w.range}</td>`:''}<td>${w.atk}</td><td>${w.hit}</td><td>${w.wnd}</td><td>${w.rnd}</td><td>${w.dmg}</td></tr>`).join('');
}

  if(!sb) return;
  try{
    const {data: photoRows} = await sb.from('model_photos').select('*').eq('force_id', forceId).order('created_at');
    (photoRows||[]).forEach(r=>{
      if(!photosState[r.unit_name]) photosState[r.unit_name] = [];
      photosState[r.unit_name].push(r);
    });
  }catch(e){ console.error('Supabase load failed', e); }
  renderUnits();
}

// Force-level ownership: which Combat Patrol / Spearhead boxes you actually own
let forceOwnedState = {}; // forceId -> boolean

async function loadForceOwnedState(){
  forceOwnedState = {};
  if(!sb) return;
  try{
    const {data} = await sb.from('owned_items').select('*').is('unit_name', null);
    (data||[]).forEach(r=> forceOwnedState[r.force_id] = r.owned);
  }catch(e){ console.error('Supabase force-owned load failed', e); }
}

async function toggleForceOwned(forceId, btnEl){
  const newVal = !forceOwnedState[forceId];
  forceOwnedState[forceId] = newVal;
  renderForceList();
  if(!sb) return;
  try{
    const {data: existing} = await sb.from('owned_items').select('id').eq('force_id',forceId).is('unit_name', null).maybeSingle();
    if(existing){
      const {error} = await sb.from('owned_items').update({owned:newVal, updated_at:new Date().toISOString()}).eq('id', existing.id);
      if(error) throw error;
    } else {
      const {error} = await sb.from('owned_items').insert({force_id:forceId, unit_name:null, owned:newVal});
      if(error) throw error;
    }
  }catch(e){
    console.error('Supabase force-owned save failed', e);
    alert('Could not save this — it will reset on refresh. Error: ' + (e.message || e));
  }
}

// Persistent picks: which Enhancement / Templar Vow / Regiment Ability is selected, per force
async function loadSelections(forceId){
  selectedEnhancement = null;
  selectedVow = null;
  selectedRegimentAbility = null;
  if(!sb) return;
  try{
    const {data} = await sb.from('selections').select('*').eq('force_id', forceId);
    (data||[]).forEach(row=>{
      if(row.kind === 'enhancement') selectedEnhancement = row.selected_index;
      if(row.kind === 'vow') selectedVow = row.selected_index;
      if(row.kind === 'regiment') selectedRegimentAbility = row.selected_index;
    });
  }catch(e){ console.error('Supabase selections load failed', e); }
}

async function saveSelection(forceId, kind, idx){
  if(!sb) return;
  try{
    const {error} = await sb.from('selections').upsert(
      {force_id: forceId, kind, selected_index: idx, updated_at: new Date().toISOString()},
      {onConflict: 'force_id,kind'}
    );
    if(error) throw error;
  }catch(e){
    console.error('Supabase selection save failed', e);
    alert('Could not save this pick — it may reset on refresh. Error: ' + (e.message || e));
  }
}

async function uploadPhoto(forceId, unitName, file){
  if(!sb){ alert('Photo sync is not connected.'); return; }
  const path = `${forceId}/${unitName.replace(/[^a-zA-Z0-9]/g,'_')}/${Date.now()}_${file.name}`;
  try{
    const {error: upErr} = await sb.storage.from('model-photos').upload(path, file);
    if(upErr){ alert('Upload failed: ' + upErr.message); return; }
    const {data: urlData} = sb.storage.from('model-photos').getPublicUrl(path);
    const {data: inserted, error: insErr} = await sb.from('model_photos')
      .insert({force_id:forceId, unit_name:unitName, photo_url:urlData.publicUrl})
      .select().single();
    if(insErr){ console.error(insErr); alert('Photo uploaded but could not be saved to the database: ' + insErr.message); return; }
    if(!photosState[unitName]) photosState[unitName] = [];
    photosState[unitName].push(inserted);
    renderUnits();
  }catch(e){ console.error('Upload failed', e); alert('Upload failed — check your connection and try again.'); }
}

async function deletePhoto(forceId, unitName, photoId){
  const list = photosState[unitName] || [];
  const idx = list.findIndex(p=> String(p.id) === String(photoId));
  if(idx === -1) return;
  const [removed] = list.splice(idx, 1);
  renderUnits();
  if(!sb) return;
  try{
    await sb.from('model_photos').delete().eq('id', photoId);
    if(removed?.photo_url){
      const marker = '/model-photos/';
      const i = removed.photo_url.indexOf(marker);
      if(i !== -1){
        const path = decodeURIComponent(removed.photo_url.slice(i + marker.length));
        await sb.storage.from('model-photos').remove([path]);
      }
    }
  }catch(e){ console.error('Delete failed', e); }
}

function wireOwnedPhotoEvents(el, forceId){
  el.querySelectorAll('.photo-input').forEach(input=>{
    input.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(file) uploadPhoto(forceId, input.dataset.unit, file);
      e.target.value = '';
    });
  });
  el.querySelectorAll('.photo-thumb .del').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault();
      deletePhoto(forceId, btn.dataset.unit, btn.dataset.photoId);
    });
  });
}


function renderUnits(){
  const el = document.getElementById('panel-units');
  const force = FORCES[currentForceId];
  const isAos = force.system === 'aos';
  const openIdxs = new Set([...el.querySelectorAll('.unit-card.open')].map(c=>c.dataset.idx));
  el.innerHTML = `<div class="section-head"><h2>${isAos ? 'Warscrolls' : 'Datasheets'}</h2><div class="rule"></div></div>` +
  force.units.map((u,i)=> isAos ? unitCardAos(u,i) : unitCard40k(u,i)).join('');

  el.querySelectorAll('.unit-card').forEach(card=>{
    if(openIdxs.has(card.dataset.idx)) card.classList.add('open');
  });
  el.querySelectorAll('.unit-head').forEach(h=>{
    h.addEventListener('click', ()=> h.closest('.unit-card').classList.toggle('open'));
  });
  wireOwnedPhotoEvents(el, force.id);
}

function unitCard40k(u,i){
  return `
    <div class="unit-card" data-idx="${i}">
      <div class="unit-head">
        <div class="unit-title">
          <span class="name">${u.name}</span>
          <span class="kw">${u.count} · ${u.kw}</span>
        </div>
        <span class="chevron">▶</span>
      </div>
      <div class="unit-body">
        ${photoSectionHtml(u.name)}
        <div class="statline">
          ${u.variants.length===1 ? statBlock(u.variants[0]) : ''}
        </div>
        ${u.variants.length>1 ? u.variants.map(v=>`<div class="model-variant"><b>${v.label}</b></div><div class="statline">${statBlock(v)}</div>`).join('') : ''}
        ${u.invuln?`<div class="invuln-pill">◆ ${u.invuln}</div><br>`:''}
        <div class="model-variant">${u.equip}</div>
        ${u.note?`<div class="model-variant">${u.note}</div>`:''}
        ${u.ranged?.length?`<table class="weapons"><caption>Ranged Weapons</caption><thead><tr><th>Weapon</th><th>Rng</th><th>A</th><th>BS</th><th>S</th><th>AP</th><th>D</th></tr></thead><tbody>${weaponRows40k(u.ranged)}</tbody></table>`:''}
        ${u.melee?.length?`<table class="weapons"><caption>Melee Weapons</caption><thead><tr><th>Weapon</th><th>Rng</th><th>A</th><th>WS</th><th>S</th><th>AP</th><th>D</th></tr></thead><tbody>${weaponRows40k(u.melee)}</tbody></table>`:''}
        ${u.abilities.map(a=>`<div class="ability">${a.core?`<span class="core">CORE:</span> ${a.text}`:`<span class="label">${a.label}</span> ${a.text}`}</div>`).join('')}
        <div class="keywords"><b>Keywords:</b> ${u.keywords}${u.ledBy?`<br><b>Led by:</b> ${u.ledBy}`:''}</div>
      </div>
    </div>
  `;
}

function unitCardAos(u,i){
  return `
    <div class="unit-card" data-idx="${i}">
      <div class="unit-head">
        <div class="unit-title">
          <span class="name">${u.name}</span>
          <span class="kw">${u.count} · ${u.kw}</span>
        </div>
        <span class="chevron">▶</span>
      </div>
      <div class="unit-body">
        ${photoSectionHtml(u.name)}
        <div class="statline">${statBlockAos(u.stats)}</div>
        ${u.ward?`<div class="invuln-pill">◆ Ward ${u.ward}</div><br>`:''}
        <div class="model-variant">${u.equip}</div>
        ${u.ranged?.length?`<table class="weapons"><caption>Ranged Weapons</caption><thead><tr><th>Weapon</th><th>Rng</th><th>Atk</th><th>Hit</th><th>Wnd</th><th>Rnd</th><th>Dmg</th></tr></thead><tbody>${weaponRowsAos(u.ranged, true)}</tbody></table>`:''}
        ${u.melee?.length?`<table class="weapons"><caption>Melee Weapons</caption><thead><tr><th>Weapon</th><th>Atk</th><th>Hit</th><th>Wnd</th><th>Rnd</th><th>Dmg</th></tr></thead><tbody>${weaponRowsAos(u.melee, false)}</tbody></table>`:''}
        ${u.abilities.map(a=>`<div class="ability"><span class="label">${a.label}</span> ${a.text}</div>`).join('')}
        <div class="keywords"><b>Keywords:</b> ${u.keywords}</div>
      </div>
    </div>
  `;
}

function statBlockAos(s){
  const labels = {m:'M', h:'H', sv:'Sv', ctrl:'Ctrl'};
  return Object.keys(labels).map(k=>`<div class="stat"><div class="k">${labels[k]}</div><div class="v">${s[k]}</div></div>`).join('');
}

function statBlock(v){
  return ['m','t','sv','w','ld','oc'].map(k=>`<div class="stat"><div class="k">${k.toUpperCase()}</div><div class="v">${v[k]}</div></div>`).join('');
}

function stratPhaseClass(when){
  const w = (when || '').toLowerCase();
  if(w.includes('opponent')) return 'strat-red';
  if(w.includes('command phase')) return 'strat-green';
  return 'strat-blue';
}

function stratCard(s){
  const cls = stratPhaseClass(s.when);
  return `<div class="info-card strat-card ${cls}">
    <div class="strat-header"><h3>${s.name}</h3><span class="cost">${s.cost}</span></div>
    <div class="rule-line"><b>When:</b> ${s.when}</div>
    <div class="rule-line"><b>Effect:</b> ${s.effect}</div>
  </div>`;
}

function renderStrats(){
  const el = document.getElementById('panel-strats');
  const force = FORCES[currentForceId];

  if(force.system === 'aos'){
    el.innerHTML = `
      <div class="section-head"><h2>Regiment Abilities</h2><div class="rule"></div></div>
      <div class="rule-line" style="color:var(--muted); font-size:12px; margin:-2px 0 10px;">Pick one for the battle — tap to select.</div>
      ${force.regimentAbilities.map((s,i)=>`
        <div class="info-card selectable" data-reg="${i}">
          <div class="row1"><h3>${s.name}</h3></div>
          <div class="rule-line"><b>When:</b> ${s.when}</div>
          <div class="rule-line"><b>Effect:</b> ${s.effect}</div>
          <div class="select-indicator">
            <span class="select-check">✓ Selected</span>
            <span class="select-prompt">Tap to select</span>
          </div>
        </div>`).join('')}
    `;
    el.querySelectorAll('.info-card.selectable').forEach(card=>{
      if(Number(card.dataset.reg) === selectedRegimentAbility) card.classList.add('selected');
      card.addEventListener('click', ()=>{
        const idx = Number(card.dataset.reg);
        selectedRegimentAbility = (selectedRegimentAbility === idx) ? null : idx;
        el.querySelectorAll('.info-card.selectable').forEach(c=>{
          c.classList.toggle('selected', Number(c.dataset.reg) === selectedRegimentAbility);
        });
        saveSelection(force.id, 'regiment', selectedRegimentAbility);
      });
    });
    return;
  }

  el.innerHTML = `
    <div class="info-card" style="border-color:var(--yellow);">
      <div class="rule-line"><b>Reminder:</b> a unit can only be affected by one Stratagem per phase.</div>
    </div>
    <div class="section-head"><h2>${force.name} Stratagems</h2><div class="rule"></div></div>
    ${force.stratagems.map(stratCard).join('')}
    <div class="section-head"><h2>Core Stratagems</h2><div class="rule"></div></div>
    ${CORE_STRATS.map(stratCard).join('')}
  `;
}

function renderFaction(){
  const el = document.getElementById('panel-faction');
  const force = FORCES[currentForceId];
  const fr = force.factionRule;
  el.innerHTML = `
    <div class="faction-rule-card">
      <h2>${fr.title}</h2>
      <div class="rule-line">${fr.when}</div>
      <ul>${fr.effects.map(e=>`<li>${e}</li>`).join('')}</ul>
    </div>

    ${force.detachmentRule ? `
    <div class="section-head"><h2>Detachment Rule</h2><div class="rule"></div></div>
    <div class="info-card">
      <div class="row1"><h3>${force.detachmentRule.name}</h3><span class="cost">${force.detachmentRule.cost}</span></div>
      <div class="rule-line">${force.detachmentRule.effect}</div>
    </div>` : ''}

    ${force.disposition ? `
    <div class="section-head"><h2>Force Disposition</h2><div class="rule"></div></div>
    <div class="info-card">
      <div class="rule-line"><b>${force.disposition.name}</b></div>
    </div>` : ''}

    ${force.vows ? `
    <div class="section-head"><h2>Templar Vows</h2><div class="rule"></div></div>
    <div class="rule-line" style="color:var(--muted); font-size:12px; margin:-2px 0 10px;">Pick one at the start of the first battle round — tap to select.</div>
    ${force.vows.map((v,i)=>`
      <div class="info-card selectable" data-vow="${i}">
        <div class="row1"><h3>${v.name}</h3><span class="default-badge">${v.badge}</span></div>
        <div class="rule-line">${v.effect}</div>
        <div class="select-indicator">
          <span class="select-check">✓ Selected</span>
          <span class="select-prompt">Tap to select</span>
        </div>
      </div>`).join('')}
    ` : ''}

    <div class="section-head"><h2>Enhancements</h2><div class="rule"></div></div>
    <div class="rule-line" style="color:var(--muted); font-size:12px; margin:-2px 0 10px;">Tap the one you're taking — only one can be selected.</div>
    ${force.enhancements.map((e,i)=>`
      <div class="info-card selectable" data-enh="${i}">
        <div class="row1"><h3>${e.name}</h3><span class="default-badge">${e.badge}</span></div>
        <div class="rule-line">${e.effect}</div>
        <div class="select-indicator">
          <span class="select-check">✓ Selected</span>
          <span class="select-prompt">Tap to select</span>
        </div>
      </div>`).join('')}

    <div class="section-head"><h2>Roster</h2><div class="rule"></div></div>
    <div class="info-card">
      <div class="rule-line">${force.roster}</div>
    </div>
  `;

  el.querySelectorAll('[data-enh]').forEach(card=>{
    if(Number(card.dataset.enh) === selectedEnhancement) card.classList.add('selected');
    card.addEventListener('click', ()=>{
      const idx = Number(card.dataset.enh);
      selectedEnhancement = (selectedEnhancement === idx) ? null : idx;
      el.querySelectorAll('[data-enh]').forEach(c=>{
        c.classList.toggle('selected', Number(c.dataset.enh) === selectedEnhancement);
      });
      saveSelection(force.id, 'enhancement', selectedEnhancement);
    });
  });

  el.querySelectorAll('[data-vow]').forEach(card=>{
    if(Number(card.dataset.vow) === selectedVow) card.classList.add('selected');
    card.addEventListener('click', ()=>{
      const idx = Number(card.dataset.vow);
      selectedVow = (selectedVow === idx) ? null : idx;
      el.querySelectorAll('[data-vow]').forEach(c=>{
        c.classList.toggle('selected', Number(c.dataset.vow) === selectedVow);
      });
      saveSelection(force.id, 'vow', selectedVow);
    });
  });
}

function renderGlossary(){
  const el = document.getElementById('panel-glossary');
  const force = FORCES[currentForceId];
  const glossary = force.system === 'aos' ? GLOSSARY_AOS : GLOSSARY_40K;
  el.innerHTML = `<div class="section-head"><h2>Rules Glossary</h2><div class="rule"></div></div>` +
    glossary.map(g=>`<div class="info-card"><div class="glossary-term">${g.term}</div><div class="rule-line" style="margin-top:5px;">${g.def}</div></div>`).join('');
}

function renderHeader(){
  const force = FORCES[currentForceId];
  document.getElementById('forceName').textContent = force.name.toUpperCase();
  document.getElementById('forceSub').textContent = force.subtitle;
}

function renderForceList(){
  const el = document.getElementById('forceList');
  const typeOrder = { 'Combat Patrol': 0, 'Spearhead': 1 };
  const sorted = Object.values(FORCES).sort((a,b)=>{
    const ta = typeOrder[a.type] ?? 99, tb = typeOrder[b.type] ?? 99;
    if(ta !== tb) return ta - tb;
    return a.name.localeCompare(b.name);
  });
  el.innerHTML = sorted.map(f=>{
    const isOwned = !!forceOwnedState[f.id];
    const typeCls = f.type === 'Combat Patrol' ? 'type-cp' : (f.type === 'Spearhead' ? 'type-sh' : '');
    const badgeCls = f.type === 'Combat Patrol' ? 'badge-cp' : (f.type === 'Spearhead' ? 'badge-sh' : '');
    return `
    <div class="force-card ${typeCls} ${f.id===currentForceId?'active':''}" data-force="${f.id}">
      <span>
        <div class="fc-name">${f.name}</div>
        <div class="fc-sub">${f.faction}</div>
      </span>
      <span class="fc-right">
        <button class="owned-toggle ${isOwned?'owned':''}" data-owned-force="${f.id}">
          <span class="dot"></span>${isOwned ? 'Owned' : 'Not Owned'}
        </button>
        <span class="fc-badge ${badgeCls}">${f.type}</span>
      </span>
    </div>
  `;}).join('');
  el.querySelectorAll('.force-card').forEach(card=>{
    card.addEventListener('click', ()=> selectForce(card.dataset.force));
  });
  el.querySelectorAll('.owned-toggle').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      toggleForceOwned(btn.dataset.ownedForce, btn);
    });
  });
}

function selectForce(id){
  if(id === currentForceId){ closeForceModal(); return; }
  currentForceId = id;
  selectedEnhancement = null;
  selectedRegimentAbility = null;
  selectedVow = null;
  document.getElementById('search').value = '';
  renderHeader();
  renderTabs();
  renderUnits();
  renderStrats();
  renderFaction();
  renderGlossary();
  renderForceList();
  closeForceModal();
  switchTab('units');
  loadForceExtras(id);
  loadSelections(id).then(()=>{ renderStrats(); renderFaction(); });
}

async function openForceModal(){
  document.getElementById('forceModal').classList.add('open');
  await loadForceOwnedState();
  renderForceList();
}
function closeForceModal(){
  document.getElementById('forceModal').classList.remove('open');
}

/* ============ SEARCH ============ */
function applySearch(q){
  q = q.trim().toLowerCase();
  document.querySelectorAll('#panel-units .unit-card').forEach(card=>{
    const match = !q || card.textContent.toLowerCase().includes(q);
    card.style.display = match ? '' : 'none';
    if(q && match) card.classList.add('open');
  });
  document.querySelectorAll('#panel-strats .info-card, #panel-glossary .info-card, #panel-faction .info-card').forEach(card=>{
    const match = !q || card.textContent.toLowerCase().includes(q);
    card.style.display = match ? '' : 'none';
  });
}

/* ============ INIT ============ */
renderTabs();
renderHeader();
renderUnits();
renderStrats();
renderFaction();
renderGlossary();
document.getElementById('search').addEventListener('input', e=> applySearch(e.target.value));
document.getElementById('forceSwitcher').addEventListener('click', openForceModal);
document.getElementById('forceModalClose').addEventListener('click', closeForceModal);
document.getElementById('forceModal').addEventListener('click', e=>{
  if(e.target.id === 'forceModal') closeForceModal();
});
loadForceExtras(currentForceId);
loadForceOwnedState();
loadSelections(currentForceId).then(()=>{ renderStrats(); renderFaction(); });

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(err=> console.error('Service worker registration failed', err));
  });
}
</script>
